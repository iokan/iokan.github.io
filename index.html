<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"/>
    <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-touch-fullscreen" content="yes"/>
    <meta name="format-detection" content="telephone=no"/>
    <meta name="MobileOptimized" content="width"/>
    <meta name="HandheldFriendly" content="true"/>
    <title>Александр Копытов</title>
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="stylesheet" href="fonts/fonts.css">
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap" rel="stylesheet">
    <!--<link rel="shortcut icon" type="image/x-icon" href="img/ico.png"/>-->
</head>
<body>

<div id="app">

    <main>

        <div class="preloader"></div>

        <section id="intro" class="intro">
<!--            <div class="intro__media"></div>-->
            <div class="intro__content">
                <h1>
                    <template  v-if="page === 'intro'">
                        <span>Frontend_</span>
                        <span>Developer</span>
                    </template>
                    <template v-else-if="page === 'about'">
                        <span>About</span>
                    </template>
                    <template v-else-if="page === 'skills'">
                        <span>skills</span>
                    </template>
                    <template v-else-if="page === 'experience'">
                        <span>experience</span>
                    </template>
                    <template v-else-if="page === 'work'">
                        <span>work</span>
                    </template>
                </h1>
            </div>
        </section>

        <transition mode="out-in" appear>

            <section id="about" class="about"
                     v-if="page === 'about'"
                     key="about">
                <h2>О себе
                    <div class="words">
                        <span>A</span>
                        <span>b</span>
                        <span>o</span>
                        <span>u</span>
                        <span>t</span>
                        <span> </span>
                        <span>m</span>
                        <span>e</span>
                    </div>
                </h2>
                <div class="timeline"></div>
                <p>Таймлайн</p>
                <p>Вся жизнь</p>
                <p>Семья*</p>
                <p>Карьера*</p>
                <p>Хобби*</p>
            </section>

            <section id="skills" class="skills"
                     v-else-if="page === 'skills'"
                     key="skills">
                <h2>Навыки
                    <div class="words">
                        <span>S</span>
                        <span>k</span>
                        <span>i</span>
                        <span>l</span>
                        <span>l</span>
                        <span>s</span>
                    </div>
                </h2>
            </section>

            <section id="experience" class="experience"
                     v-else-if="page === 'experience'"
                     key="experience">
                <h2>Опыт
                    <div class="words">
                        <span>E</span>
                        <span>x</span>
                        <span>p</span>
                        <span>e</span>
                        <span>r</span>
                        <span>i</span>
                        <span>e</span>
                        <span>n</span>
                        <span>c</span>
                        <span>e</span>
                    </div>
                </h2>

            </section>

            <section id="work" class="work"
                     v-else-if="page === 'work'"
                     key="work">
                <h2>Мои работы
                    <div class="words">
                        <span>W</span>
                        <span>o</span>
                        <span>r</span>
                        <span>k</span>
                    </div>
                </h2>
<!--                <iframe src="http://bar-in.club/" width="600" height="500"></iframe>-->
<!--                <iframe src="https://andrew-r.ru/" width="600" height="500"></iframe>-->
            </section>

        </transition>

        <footer>
            <div class="btn" :class="{selected:page === 'intro'}" @click="page = 'intro'">intro</div>
            <div class="btn" :class="{selected:page === 'about'}" @click="page = 'about'">about</div>
            <div class="btn" :class="{selected:page === 'skills'}" @click="page = 'skills'">skills</div>
            <div class="btn" :class="{selected:page === 'experience'}" @click="page = 'experience'">experience</div>
            <div class="btn" :class="{selected:page === 'work'}" @click="page = 'work'">work</div>
        </footer>

    </main>

</div>
<!-- production version, optimized for size and speed -->
<!--<script src="https://cdn.jsdelivr.net/npm/vue"></script>-->
<!-- development version, includes helpful console warnings -->
<script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
<script src="js/realvh.js"></script>
<script src="js/vue.js"></script>
</body>
</html>
