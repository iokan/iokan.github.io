        <transition mode="out-in" name="page">

            <section id="about" class="about"
                     v-if="page === 'about'"
                     key="about">
                <div class="container">
                    <div class="timeline">
                        <div class="timeline__table">
                            <div class="table__item"
                                 v-for="n in amountItem(birthDate, lifetimeDate)"
                                 :class="{
                             life:timeline === 'life' && n <= amountItem(birthDate, currentDate),
                             job:timeline === 'job' && n <= amountItem(birthDate, currentDate) && n >= (amountItem(birthDate, currentDate) - amountItem(workDateBuilding, currentDate)),
                             opacity:
                                (timelineNav === 'wedding' && n <= (amountItem(birthDate, currentDate) - amountItem(weddingDate, currentDate)))
                                || (timelineNav === 'parent' && n <= (amountItem(birthDate, currentDate) - amountItem(birthDateDaughter, currentDate)))
                                || (timelineNav === 'building' && n <= amountItem(birthDate, currentDate) && n >= (amountItem(birthDate, currentDate) - amountItem(workDateIt, currentDate)))
                                || (timelineNav === 'it' && n <= amountItem(birthDate, workDateIt) && n >= (amountItem(birthDate, currentDate) - amountItem(workDateBuilding, currentDate)))
                             }">
                                <span v-if="n === 48">Год</span>
                                <span v-else-if="n === 960">20</span>
                                <span v-else-if="n === 1920">40</span>
                                <span v-else-if="n === 2880">60</span>
                                <span v-else-if="n === 3840">80</span>
                            </div>
                            <div class="timeline__period">{{timelinePeriod}} {{timelinePeriodText}}</div>
                        </div>

                        <nav class="timeline__nav">
                            <ul class="nav__list nav__list_life">
                                <li class="nav__item" @click="timeline = 'life', timelineNav = false">Жизнь</li>
                                <transition name="shiftRight">
                                    <ul class="nav__sublist nav__sublist_life" v-if="timeline === 'life'">
                                        <li class="nav__item" @click="timelineNav = 'wedding'" key="wedding">Женился
                                        </li>
                                        <li class="nav__item" @click="timelineNav = 'parent'" key="parent">Родилась
                                            дочка
                                        </li>
                                    </ul>
                                </transition>
                            </ul>

                            <ul class="nav__list nav__list_job">
                                <li class="nav__item" @click="timeline = 'job', timelineNav = false">Работа</li>
                                <transition name="shiftLeft">
                                    <ul class="nav__sublist nav__sublist_job" v-if="timeline === 'job'">
                                        <li class="nav__item" @click="timelineNav = 'building'"
                                            key="building">Строительство
                                        </li>
                                        <li class="nav__item" @click="timelineNav = 'it'" key="it">ИТ</li>
                                    </ul>
                                </transition>
                            </ul>

                        </nav>

                    </div>
                </div>
            </section>
